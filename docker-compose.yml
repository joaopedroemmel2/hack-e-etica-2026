services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowlog_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-flowlog_db}
    ports:
      - '127.0.0.1:${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-flowlog} -d ${POSTGRES_DB:-flowlog_db}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 3000
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-flowlog}:${POSTGRES_PASSWORD:-flowlog_dev_password}@postgres:5432/${POSTGRES_DB:-flowlog_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY must be configured}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    environment:
      PORT: 3001
    ports:
      - '${FRONTEND_PORT:-3001}:3001'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
